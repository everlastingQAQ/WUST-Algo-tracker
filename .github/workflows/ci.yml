name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Run focused tests
        run: |
          go test ./app/core_data/internal/data/dal ./app/core_data/internal/biz/service ./app/core_data/internal/spider/platform ./app/core_data/task ./app/user/internal/service ./app/user/internal/data/dal

      - name: Build backend services
        run: |
          mkdir -p dist
          go build -o dist/wust-user ./app/user/cmd/user
          go build -o dist/wust-core-data ./app/core_data/cmd/core_data
          cd app/gateway
          go build -o ../../dist/wust-gateway ./cmd/gateway

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: wust-algo-backend-bin
          path: dist
          if-no-files-found: error
