syntax = "proto3";

package api.core.v1.bulletin;

import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/core/v1/bulletin;bulletin";
option java_multiple_files = true;
option java_package = "api.core.v1.bulletin";

// 公告服务：管理员和教练可发布/编辑/删除公告，所有人可查看
service Bulletin {
  // 创建公告（教练/管理员）
  rpc Create (CreateBulletinReq) returns (CreateBulletinRes) {
    option (google.api.http) = {
      post: "/v1/core/bulletin/create"
      body: "*"
    };
  }
  // 更新公告（教练/管理员）
  rpc Update (UpdateBulletinReq) returns (UpdateBulletinRes) {
    option (google.api.http) = {
      post: "/v1/core/bulletin/update"
      body: "*"
    };
  }
  // 删除公告（教练/管理员）
  rpc Delete (DeleteBulletinReq) returns (DeleteBulletinRes) {
    option (google.api.http) = {
      delete: "/v1/core/bulletin/delete"
    };
  }
  // 获取单条公告详情（公开）
  rpc Get (GetBulletinReq) returns (GetBulletinRes) {
    option (google.api.http) = {
      get: "/v1/core/bulletin/get"
    };
  }
  // 分页获取公告列表（公开）
  rpc List (ListBulletinReq) returns (ListBulletinRes) {
    option (google.api.http) = {
      get: "/v1/core/bulletin/list"
    };
  }
}

// 公告实体
message BulletinInfo {
  int64 id = 1;
  string title = 2;
  string content = 3;
  int64 authorId = 4;
  string authorName = 5;
  bool isPinned = 6;
  int64 createdAt = 7;
  int64 updatedAt = 8;
}

// 创建公告
message CreateBulletinReq {
  string title = 1;
  string content = 2;
  bool isPinned = 3;
}

message CreateBulletinRes {
  int64 code = 1;
  string message = 2;
  BulletinInfo data = 3;
}

// 更新公告
message UpdateBulletinReq {
  int64 id = 1;
  string title = 2;
  string content = 3;
  bool isPinned = 4;
}

message UpdateBulletinRes {
  int64 code = 1;
  string message = 2;
  BulletinInfo data = 3;
}

// 删除公告
message DeleteBulletinReq {
  int64 id = 1;
}

message DeleteBulletinRes {
  int64 code = 1;
  string message = 2;
}

// 获取单条公告
message GetBulletinReq {
  int64 id = 1;
}

message GetBulletinRes {
  int64 code = 1;
  string message = 2;
  BulletinInfo data = 3;
}

// 分页获取公告列表
message ListBulletinReq {
  int64 page = 1;       // 页码，默认1
  int64 pageSize = 2;   // 每页条数，默认10
}

message ListBulletinRes {
  int64 code = 1;
  string message = 2;
  repeated BulletinInfo data = 3;
  int64 total = 4;       // 总条数
  int64 page = 5;        // 当前页码
  int64 pageSize = 6;    // 每页条数
}
